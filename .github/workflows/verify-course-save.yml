name: Verify course persistence

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-course-save.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Require database confirmation after saving a course
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app/admin/courses/page.tsx')
          text = path.read_text(encoding='utf-8')
          old = '''      const savedCourse = refreshedCourses.find((item) => item.id === finalId);
      const savedPointsFromDb = refreshedPoints
        .filter((point) => point.courseId === finalId)
        .sort((a, b) => a.pointOrder - b.pointOrder);
      const nextPoints = savedPointsFromDb.length ? savedPointsFromDb : normalizedPoints;

      const nextTitle = savedCourse?.title || title.trim();
'''
          new = '''      const savedCourse = refreshedCourses.find((item) => item.id === finalId);
      const savedPointsFromDb = refreshedPoints
        .filter((point) => point.courseId === finalId)
        .sort((a, b) => a.pointOrder - b.pointOrder);

      if (!savedCourse) {
        throw new Error("保存APIは成功を返しましたが、コースがデータベースに登録されていません。入力内容は未保存のまま残しています。");
      }
      if (savedPointsFromDb.length !== normalizedPoints.length) {
        throw new Error(`コース本体は登録されましたが、地点の保存件数が一致しません（予定${normalizedPoints.length}件／登録${savedPointsFromDb.length}件）。`);
      }

      const nextPoints = savedPointsFromDb;
      const nextTitle = savedCourse.title || title.trim();
'''
          if old not in text:
            raise SystemExit('Target save verification block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "TimeWalk Bot"
          git config user.email "timewalk-bot@users.noreply.github.com"
          git add app/admin/courses/page.tsx
          git commit -m "Verify course persistence before showing saved"
          git push
