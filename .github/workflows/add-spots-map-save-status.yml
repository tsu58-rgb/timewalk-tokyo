name: Add spots map save status

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-spots-map-save-status.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch spots map editor
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/admin/spots-map/page.tsx")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match, found {count}: {old[:160]!r}")
              text = text.replace(old, new, 1)

          replace_once(
              "function reviewReasons(spot: Spot, characterIds: Set<string>) {",
              "function serializeSpot(spot: Spot) {\n  return JSON.stringify(normalizeSpot(spot));\n}\n\nfunction reviewReasons(spot: Spot, characterIds: Set<string>) {",
          )

          replace_once(
              "  const selectionTokenRef = useRef(0);",
              "  const selectionTokenRef = useRef(0);\n  const dirtyRef = useRef(false);",
          )

          replace_once(
              "  const [pendingMove, setPendingMove] = useState<{ lat: number; lng: number } | null>(null);",
              "  const [pendingMove, setPendingMove] = useState<{ lat: number; lng: number } | null>(null);\n  const [savedSnapshot, setSavedSnapshot] = useState(() => serializeSpot(emptySpot));\n  const [imageDirty, setImageDirty] = useState(false);",
          )

          review_block = "\n".join([
              "  const reviewItems: ReviewItem[] = useMemo(",
              "    () => spots.map((item) => ({ spot: item, reasons: reviewReasons(item, characterIds) })).filter((item) => item.reasons.length),",
              "    [spots, characterIds]",
              "  );",
          ])
          replace_once(
              review_block,
              review_block + "\n\n" + "\n".join([
                  "  const currentSnapshot = useMemo(() => serializeSpot(spot), [spot]);",
                  "  const isDirty = imageDirty || pendingMove !== null || currentSnapshot !== savedSnapshot;",
                  "",
                  "  useEffect(() => {",
                  "    dirtyRef.current = isDirty;",
                  "  }, [isDirty]);",
                  "",
                  "  useEffect(() => {",
                  "    if (!isDirty) return;",
                  "    const handleBeforeUnload = (event: BeforeUnloadEvent) => {",
                  "      event.preventDefault();",
                  "      event.returnValue = \"\";",
                  "    };",
                  "    window.addEventListener(\"beforeunload\", handleBeforeUnload);",
                  "    return () => window.removeEventListener(\"beforeunload\", handleBeforeUnload);",
                  "  }, [isDirty]);",
              ]),
          )

          start = text.index("  function selectSpot(nextSpot: Spot) {")
          end = text.index("\n\n  async function loadCharacterIds()", start)
          text = text[:start] + "\n".join([
              "  function selectSpot(nextSpot: Spot) {",
              "    if (savingRef.current) return false;",
              "    if (dirtyRef.current && !window.confirm(\"未保存の変更があります。保存せずに別の地点へ移動しますか？\")) {",
              "      return false;",
              "    }",
              "    const normalized = normalizeSpot(nextSpot);",
              "    selectionTokenRef.current += 1;",
              "    setSpot(normalized);",
              "    setSavedSnapshot(serializeSpot(normalized));",
              "    setPendingMove(null);",
              "    setImageBase64(\"\");",
              "    setImageDirty(false);",
              "    if (fileInputRef.current) fileInputRef.current.value = \"\";",
              "    return true;",
              "  }",
          ]) + text[end:]

          replace_once(
              "    map.on(\"click\", async (event: any) => {\n      if (savingRef.current) return;",
              "    map.on(\"click\", async (event: any) => {\n      if (savingRef.current) return;\n      if (dirtyRef.current && !window.confirm(\"未保存の変更があります。保存せずに新しい地点を作成しますか？\")) return;",
          )

          replace_once(
              "      setSpot({ ...emptySpot, lat, lng, ...address });\n      setPendingMove(null);\n      setImageBase64(\"\");",
              "      setSpot({ ...emptySpot, lat, lng, ...address });\n      setSavedSnapshot(\"\");\n      setPendingMove(null);\n      setImageBase64(\"\");\n      setImageDirty(false);",
          )

          replace_once(
              "          const point = event.target.getLatLng();\n          selectSpot(item.spot);\n          setPendingMove({ lat: point.lat, lng: point.lng });",
              "          const point = event.target.getLatLng();\n          if (!selectSpot(item.spot)) {\n            loadExistingSpots(true);\n            return;\n          }\n          setPendingMove({ lat: point.lat, lng: point.lng });",
          )

          old_save = "\n".join([
              "      const { imageBase64: _unusedImageBase64, ...savedSpot } = savingSpot;",
              "      setSpot({",
              "        ...savedSpot,",
              "        id: json.id,",
              "        spotsImage: json.spotsImage || savedSpot.spotsImage || \"\",",
              "      });",
              "      setImageBase64(\"\");",
              "      if (fileInputRef.current) fileInputRef.current.value = \"\";",
              "      setMessage(`保存しました：${json.id}`);",
              "      await loadExistingSpots(true);",
          ])
          new_save = "\n".join([
              "      const { imageBase64: _unusedImageBase64, ...savedSpot } = savingSpot;",
              "      const nextSpot = normalizeSpot({",
              "        ...savedSpot,",
              "        id: json.id,",
              "        spotsImage: json.spotsImage || savedSpot.spotsImage || \"\",",
              "      });",
              "      setSpot(nextSpot);",
              "      setSavedSnapshot(serializeSpot(nextSpot));",
              "      setImageBase64(\"\");",
              "      setImageDirty(false);",
              "      setPendingMove(null);",
              "      if (fileInputRef.current) fileInputRef.current.value = \"\";",
              "      await loadExistingSpots(true);",
              "      setMessage(`保存しました：${json.id}`);",
          ])
          replace_once(old_save, new_save)

          replace_once(
              "                  selectSpot(item.spot);\n                  setViewMode(\"map\");",
              "                  if (!selectSpot(item.spot)) return;\n                  setViewMode(\"map\");",
          )

          replace_once(
              "            const file = event.target.files?.[0];\n            if (!file) return;\n            const reader = new FileReader();",
              "            const file = event.target.files?.[0];\n            if (!file) return;\n            setImageDirty(true);\n            const reader = new FileReader();",
          )

          replace_once(
              "        <label>trivia</label>\n        <textarea value={spot.trivia || \"\"} onChange={(event) => setSpot({ ...spot, trivia: event.target.value })} style={textareaStyle} />\n        <button type=\"button\" onClick={saveSpot} disabled={isSaving} style={buttonStyle}>{isSaving ? \"保存中...\" : \"保存\"}</button>",
              "        <label>trivia</label>\n        <textarea value={spot.trivia || \"\"} onChange={(event) => setSpot({ ...spot, trivia: event.target.value })} style={textareaStyle} />\n        <div\n          role=\"status\"\n          aria-live=\"polite\"\n          style={{\n            marginTop: 14,\n            marginBottom: 4,\n            fontSize: 18,\n            fontWeight: 900,\n            color: isSaving ? \"#b45309\" : isDirty ? \"#dc2626\" : \"#16a34a\",\n          }}\n        >\n          {isSaving ? \"保存中\" : isDirty ? \"未保存\" : \"保存済み\"}\n        </div>\n        <button type=\"button\" onClick={saveSpot} disabled={isSaving} style={buttonStyle}>{isSaving ? \"保存中...\" : \"保存\"}</button>",
          )

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit patch
        run: |
          git config user.name "TimeWalk Bot"
          git config user.email "timewalk-bot@users.noreply.github.com"
          git add app/admin/spots-map/page.tsx
          git commit -m "Add unsaved and saved status to spots map editor"
          git push
