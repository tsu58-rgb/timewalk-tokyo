name: Apply map UI adjustments

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-map-ui-adjustments.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch TimeWalk home and course page
        run: |
          python - <<'PY'
          from pathlib import Path

          home_path = Path('app/components/TimeWalkHome.tsx')
          home = home_path.read_text(encoding='utf-8')

          home = home.replace(
            'setError("位置情報が取得できません: " + err.message);',
            'setError("位置情報が取得できないため表示できません。");'
          )

          old_location = '''        <div className="flex items-center justify-center gap-2 mb-4">
          {address ? (
            <>
              <p className="text-sm text-slate-300">📍 {address}</p>
              <button
                onClick={() => getCurrentLocation(true)}
                className="bg-blue-500 text-white px-3 py-1 rounded-lg text-sm font-bold whitespace-nowrap"
              >
                {locationLoading ? "取得中" : "現在地"}
              </button>
            </>
          ) : (
            <a href="https://yuru-rekishi-sanpo.com/timewalk#toc11" target="_blank" rel="noopener noreferrer" className="text-sm text-yellow-300 underline font-bold">位置情報サービスをオンにしてください</a>
          )}
        </div>
'''
          new_location = '''        {address && (
          <div className="flex items-center justify-center gap-2 mb-4">
            <p className="text-sm text-slate-300">📍 {address}</p>
            <button
              onClick={() => getCurrentLocation(true)}
              className="bg-blue-500 text-white px-3 py-1 rounded-lg text-sm font-bold whitespace-nowrap"
            >
              {locationLoading ? "取得中" : "現在地"}
            </button>
          </div>
        )}
'''
          if old_location not in home:
            raise SystemExit('Top location block not found')
          home = home.replace(old_location, new_location, 1)

          old_messages = '''        {error && !position && <p className="bg-red-900 rounded-xl p-3 mb-4 text-sm">{error}</p>}
        {!position && !error && <p className="bg-slate-800 rounded-xl p-3 mb-4 text-sm">基準地点を取得中です。</p>}
        {position && selectedTags.length === 0 && <p className="bg-slate-800 rounded-xl p-3 mb-4 text-sm">タグが選択されていません。</p>}

        <div className="mb-3">
          <p className="font-bold">近くの歴史スポット</p>
          <p className="text-xs text-slate-400 mt-1">{visibleSpots.length}件（最大{DISPLAY_LIMIT}件表示）</p>
        </div>

        {visibleSpots.length === 0 ? (
          <p className="bg-slate-800 rounded-xl p-3 mb-4 text-sm">条件に合う登録スポットがありません。</p>
        ) : (
'''
          new_messages = '''        {position && selectedTags.length === 0 && <p className="bg-slate-800 rounded-xl p-3 mb-4 text-sm">タグが選択されていません。</p>}

        <div className="mb-3">
          <p className="font-bold">近くの歴史スポット</p>
          <p className="text-xs text-slate-400 mt-1">{visibleSpots.length}件（最大{DISPLAY_LIMIT}件表示）</p>
        </div>

        {error && !position && <p className="bg-red-900 rounded-xl p-3 mb-4 text-sm">位置情報が取得できないため表示できません。</p>}
        {!position && !error && <p className="bg-slate-800 rounded-xl p-3 mb-4 text-sm">基準地点を取得中です。</p>}

        {!position ? null : visibleSpots.length === 0 ? (
          <p className="bg-slate-800 rounded-xl p-3 mb-4 text-sm">条件に合う登録スポットがありません。</p>
        ) : (
'''
          if old_messages not in home:
            raise SystemExit('Location/list message block not found')
          home = home.replace(old_messages, new_messages, 1)
          home_path.write_text(home, encoding='utf-8')

          course_path = Path('app/courses/[id]/page.tsx')
          course = course_path.read_text(encoding='utf-8')
          old_map = '<CourseRouteMapLoader points={points} />'
          new_map = '''<CourseRouteMapLoader
              points={points}
              allSpots={spots.map((spot) => ({
                id: spot.id,
                name: spot.name,
                lat: spot.lat,
                lng: spot.lng,
              }))}
            />'''
          if old_map not in course:
            raise SystemExit('CourseRouteMapLoader call not found')
          course = course.replace(old_map, new_map, 1)
          course_path.write_text(course, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "TimeWalk Bot"
          git config user.email "timewalk-bot@users.noreply.github.com"
          git add app/components/TimeWalkHome.tsx app/courses/[id]/page.tsx
          git commit -m "Adjust geolocation messages and enrich course maps"
          git push
