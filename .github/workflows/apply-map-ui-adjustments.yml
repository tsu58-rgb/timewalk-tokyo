name: Apply course map props

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-map-ui-adjustments.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Pass all spots to course map
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app/courses/[id]/page.tsx')
          text = path.read_text(encoding='utf-8')
          old = '<CourseRouteMapLoader points={points} />'
          new = '''<CourseRouteMapLoader
              points={points}
              allSpots={spots.map((spot) => ({
                id: spot.id,
                name: spot.name,
                lat: spot.lat,
                lng: spot.lng,
              }))}
            />'''
          if old not in text:
            raise SystemExit('Course map call not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "TimeWalk Bot"
          git config user.email "timewalk-bot@users.noreply.github.com"
          git add app/courses/[id]/page.tsx
          git commit -m "Pass all spots to course map"
          git push
