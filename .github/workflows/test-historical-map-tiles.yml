name: Test historical map tiles

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/test-historical-map-tiles.yml

permissions:
  contents: write

jobs:
  test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test tile URLs
        run: |
          mkdir -p diagnostics /tmp/maptiles
          python - <<'PY'
          import subprocess
          from pathlib import Path

          urls = [
              ('edo_png', 'https://mapwarper.h-gis.jp/mosaics/tile/25/14/14552/6451.png'),
              ('tokyo5000_mirror_jpg', 'https://boiledorange73.sakura.ne.jp/ws/tile/Tokyo5000-900913/14/14552/6451.jpg'),
              ('rapid_mirror_jpg', 'https://boiledorange73.sakura.ne.jp/ws/tile/Kanto_Rapid-900913/14/14552/6451.jpg'),
              ('tokyo5000_aginfo_png', 'https://aginfo.cgk.affrc.go.jp/ws/tmc/1.0.0/Tokyo5000-900913-L/14/14552/6451.png'),
          ]

          lines = []
          for name, url in urls:
              out = Path('/tmp/maptiles') / f'{name}.bin'
              cmd = [
                  'curl', '-L', '--max-time', '20',
                  '-A', 'Mozilla/5.0 TimeWalk tile diagnostic',
                  '-sS', '-o', str(out), '-w', '%{http_code}\t%{content_type}\t%{size_download}\t%{url_effective}', url
              ]
              try:
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=25)
                  file_type = subprocess.run(['file', '-b', str(out)], capture_output=True, text=True).stdout.strip() if out.exists() else ''
                  lines.append(f'{name}\t{result.stdout.strip()}\tfile={file_type}\tstderr={result.stderr.strip()}')
              except Exception as exc:
                  lines.append(f'{name}\tERROR\t{exc}')

          Path('diagnostics/map-tile-test.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Commit results
        run: |
          git config user.name "TimeWalk Bot"
          git config user.email "timewalk-bot@users.noreply.github.com"
          git add diagnostics/map-tile-test.txt
          git commit -m "Update historical map tile diagnostic"
          git push
