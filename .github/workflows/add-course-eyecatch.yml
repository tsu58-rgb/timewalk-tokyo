name: Add course eyecatch upload UI

on:
  push:
    paths:
      - '.github/workflows/add-course-eyecatch.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch course admin page
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/admin/courses/page.tsx')
          text = path.read_text()

          text = text.replace(
              'import { useEffect, useMemo, useState } from "react";',
              'import { useEffect, useMemo, useState } from "react";'
          )

          helper_anchor = '''function getTodayDate() {
            const now = new Date();'''
          helper_replacement = '''function fileToDataUrl(file: File): Promise<string> {
            return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => resolve(String(reader.result || ""));
              reader.onerror = () => reject(new Error("画像を読み込めませんでした。"));
              reader.readAsDataURL(file);
            });
          }

          function getTodayDate() {
            const now = new Date();'''
          if helper_anchor not in text:
              raise SystemExit('helper anchor not found')
          text = text.replace(helper_anchor, helper_replacement, 1)

          state_anchor = '''  const [status, setStatus] = useState("draft");
            const [points, setPoints] = useState<CoursePoint[]>([]);'''
          state_replacement = '''  const [status, setStatus] = useState("draft");
            const [eyecatchImage, setEyecatchImage] = useState("");
            const [eyecatchImageBase64, setEyecatchImageBase64] = useState("");
            const [removeEyecatchImage, setRemoveEyecatchImage] = useState(false);
            const [eyecatchInputKey, setEyecatchInputKey] = useState(0);
            const [points, setPoints] = useState<CoursePoint[]>([]);'''
          if state_anchor not in text:
              raise SystemExit('state anchor not found')
          text = text.replace(state_anchor, state_replacement, 1)

          new_anchor = '''    setArea("");
              setStatus("draft");
              setPoints([]);'''
          new_replacement = '''    setArea("");
              setStatus("draft");
              setEyecatchImage("");
              setEyecatchImageBase64("");
              setRemoveEyecatchImage(false);
              setEyecatchInputKey((value) => value + 1);
              setPoints([]);'''
          if new_anchor not in text:
              raise SystemExit('new course reset anchor not found')
          text = text.replace(new_anchor, new_replacement, 1)

          load_anchor = '''    setArea(course.area);
              setStatus(course.status || "draft");
              setPoints('''
          load_replacement = '''    setArea(course.area);
              setStatus(course.status || "draft");
              setEyecatchImage(course.eyecatchImage || "");
              setEyecatchImageBase64("");
              setRemoveEyecatchImage(false);
              setEyecatchInputKey((value) => value + 1);
              setPoints('''
          if load_anchor not in text:
              raise SystemExit('load course anchor not found')
          text = text.replace(load_anchor, load_replacement, 1)

          function_anchor = '''  async function saveCourse() {
            if (!date) {'''
          function_replacement = '''  async function onEyecatchChange(event: React.ChangeEvent<HTMLInputElement>) {
            const file = event.target.files?.[0];
            if (!file) return;
            if (!file.type.startsWith("image/")) {
              setMessage("画像ファイルを選択してください。");
              return;
            }
            if (file.size > 12 * 1024 * 1024) {
              setMessage("アイキャッチ画像は12MB以下にしてください。");
              return;
            }

            try {
              const dataUrl = await fileToDataUrl(file);
              setEyecatchImageBase64(dataUrl);
              setEyecatchImage(dataUrl);
              setRemoveEyecatchImage(false);
              setMessage("アイキャッチ画像を選択しました。コース保存時にCloudinaryへ登録します。");
            } catch (error) {
              setMessage(error instanceof Error ? error.message : "画像を読み込めませんでした。");
            }
          }

          function clearEyecatch() {
            setEyecatchImage("");
            setEyecatchImageBase64("");
            setRemoveEyecatchImage(true);
            setEyecatchInputKey((value) => value + 1);
          }

          async function saveCourse() {
            if (!date) {'''
          if function_anchor not in text:
              raise SystemExit('save function anchor not found')
          text = text.replace(function_anchor, function_replacement, 1)

          payload_anchor = '''            durationMin,
                        durationLabel: formatCourseDuration(durationMin),
                      },'''
          payload_replacement = '''            durationMin,
                        durationLabel: formatCourseDuration(durationMin),
                        eyecatchImage: eyecatchImage.startsWith("data:") ? "" : eyecatchImage,
                        eyecatchImageBase64,
                        removeEyecatchImage,
                      },'''
          if payload_anchor not in text:
              raise SystemExit('payload anchor not found')
          text = text.replace(payload_anchor, payload_replacement, 1)

          saved_anchor = '''      if (savedCourse) {
                setStatus(savedCourse.status || status);
                setDate(savedCourse.date || date);
              }
              setMessage(`'''
          saved_replacement = '''      if (savedCourse) {
                setStatus(savedCourse.status || status);
                setDate(savedCourse.date || date);
                setEyecatchImage(savedCourse.eyecatchImage || json.eyecatchImage || eyecatchImage);
              } else if (json.eyecatchImage) {
                setEyecatchImage(json.eyecatchImage);
              }
              setEyecatchImageBase64("");
              setRemoveEyecatchImage(false);
              setEyecatchInputKey((value) => value + 1);
              setMessage(`'''
          if saved_anchor not in text:
              raise SystemExit('saved course anchor not found')
          text = text.replace(saved_anchor, saved_replacement, 1)

          ui_anchor = '''            <label>公開状態</label>
                        <select value={status} onChange={(event) => setStatus(event.target.value)} style={inputStyle}>
                          <option value="draft">draft</option>
                          <option value="ready">ready</option>
                        </select>

                        <div style={{ padding: 12, background: "#eef5ff", marginBottom: 12 }}>'''
          ui_replacement = '''            <label>公開状態</label>
                        <select value={status} onChange={(event) => setStatus(event.target.value)} style={inputStyle}>
                          <option value="draft">draft</option>
                          <option value="ready">ready</option>
                        </select>

                        <label>アイキャッチ画像</label>
                        <div style={{ margin: "4px 0 12px", border: "1px solid #aaa", borderRadius: 8, padding: 10, background: "#fafafa" }}>
                          <input
                            key={eyecatchInputKey}
                            type="file"
                            accept="image/*"
                            onChange={onEyecatchChange}
                            disabled={saving}
                            style={{ display: "block", width: "100%", color: "#111" }}
                          />
                          <p style={{ margin: "8px 0", fontSize: 12, color: "#555" }}>
                            16:9・横1200px以上を推奨。保存時にWebPへ変換してCloudinaryへ登録します。
                          </p>
                          {eyecatchImage && (
                            <>
                              <img
                                src={eyecatchImage}
                                alt="アイキャッチ画像プレビュー"
                                style={{ display: "block", width: "100%", aspectRatio: "16 / 9", objectFit: "cover", borderRadius: 6, background: "#111" }}
                              />
                              <button
                                type="button"
                                onClick={clearEyecatch}
                                disabled={saving}
                                style={{ marginTop: 8, padding: "7px 12px", border: "1px solid #b91c1c", borderRadius: 6, background: "#fff", color: "#b91c1c", fontWeight: 700 }}
                              >
                                画像を削除
                              </button>
                            </>
                          )}
                        </div>

                        <div style={{ padding: 12, background: "#eef5ff", marginBottom: 12 }}>'''
          if ui_anchor not in text:
              raise SystemExit('UI anchor not found')
          text = text.replace(ui_anchor, ui_replacement, 1)

          path.write_text(text)
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/courses/page.tsx
          git commit -m "Add course eyecatch image upload UI"
          git push
