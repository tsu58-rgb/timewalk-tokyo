name: Diagnose map mirrors

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check image responses
        run: |
          mkdir -p diagnostics /tmp/mapcheck
          : > diagnostics/map-mirror-test.txt
          test_url() {
            name="$1"
            url="$2"
            output="/tmp/mapcheck/${name}"
            result=$(curl -L --max-time 25 -A 'Mozilla/5.0 TimeWalk' -sS -o "$output" -w '%{http_code}|%{content_type}|%{size_download}|%{url_effective}' "$url" 2>&1) || true
            kind=$(file -b "$output" 2>/dev/null || true)
            printf '%s|%s|file=%s\n' "$name" "$result" "$kind" >> diagnostics/map-mirror-test.txt
          }
          test_url edo 'https://mapwarper.h-gis.jp/mosaics/tile/25/14/14552/6451.png'
          test_url tokyo5000 'https://boiledorange73.sakura.ne.jp/ws/tile/Tokyo5000-900913/14/14552/6451.jpg'
          test_url rapid 'https://boiledorange73.sakura.ne.jp/ws/tile/Kanto_Rapid-900913/14/14552/6451.jpg'
      - name: Commit diagnostic
        run: |
          git config user.name 'TimeWalk Bot'
          git config user.email 'timewalk-bot@users.noreply.github.com'
          git add diagnostics/map-mirror-test.txt
          git commit -m 'Record map mirror test results'
          git push
