name: Fix course eyecatch reliability

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply one-time patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/admin/courses/page.tsx')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              'export default function AdminCoursesPage() {\n  const previewObjectUrlRef = useRef("");',
              'export default function AdminCoursesPage() {\n  const eyecatchInputRef = useRef<HTMLInputElement | null>(null);\n  const previewObjectUrlRef = useRef("");'
          )

          text = text.replace(
              '    setSaving(true);\n    setMessage(selectedEyecatchFile ? "画像を読み込んでコースを更新中です..." : "コースを更新中です...");\n\n    try {\n      const imageBase64 = selectedEyecatchFile\n        ? await fileToDataUrlWithTimeout(selectedEyecatchFile)\n        : "";',
              '    const selectedEyecatch = eyecatchInputRef.current?.files?.[0] || selectedEyecatchFile;\n\n    setSaving(true);\n    setMessage(selectedEyecatch ? "画像を読み込んでコースを更新中です..." : "コースを更新中です...");\n\n    try {\n      const imageBase64 = selectedEyecatch\n        ? await fileToDataUrlWithTimeout(selectedEyecatch)\n        : "";'
          )

          text = text.replace(
              '      if (selectedEyecatchFile && !isCloudinaryUrl(json.eyecatchImage)) {',
              '      if (selectedEyecatch && !isCloudinaryUrl(json.eyecatchImage)) {'
          )

          text = text.replace(
              '              <input\n                key={eyecatchInputKey}\n                type="file"',
              '              <input\n                ref={eyecatchInputRef}\n                key={eyecatchInputKey}\n                type="file"'
          )

          text = text.replace(
              '                onChange={onEyecatchChange}',
              '                onInput={() => { if (eyecatchInputRef.current?.files?.[0]) setExplicitDirty(true); }}\n                onChange={(event) => { setExplicitDirty(true); void onEyecatchChange(event); }}'
          )

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch when needed
        run: |
          if git diff --quiet; then
            echo "No patch needed"
            exit 0
          fi
          git config user.name "TimeWalk Bot"
          git config user.email "timewalk-bot@users.noreply.github.com"
          git add app/admin/courses/page.tsx
          git commit -m "Fix course eyecatch selection and upload"
          git push
